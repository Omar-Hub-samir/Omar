
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عمر & دعاء</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Cairo',sans-serif;
background:#140b06;
color:white;
overflow-x:hidden;
}
.hero{
height:100vh;
background:url('assets/hero.jpg') center/cover no-repeat;
position:relative;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}
.hero::before{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,.5);
}
.content{
position:relative;
z-index:2;
padding:20px;
}
h1{
font-size:72px;
color:#f0cf9a;
margin:15px 0;
}
.subtitle{
font-size:26px;
}
.countdown{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-top:35px;
}
.box{
background:rgba(255,255,255,.12);
padding:20px;
border-radius:20px;
min-width:90px;
backdrop-filter:blur(8px);
}
.box span{
display:block;
font-size:38px;
font-weight:bold;
color:#f7d7a7;
}
.section{
padding:70px 20px;
text-align:center;
}
.invite{
background:#efe6dc;
color:#8a644d;
}
.invite h2{
font-size:48px;
margin-bottom:35px;
}
.invite p{
font-size:30px;
line-height:2;
}
.cover img{
width:90%;
max-width:950px;
border-radius:30px;
border:3px solid #d8ae74;
box-shadow:0 0 35px rgba(216,174,116,.35);
}
.card{
max-width:700px;
margin:auto;
padding:35px;
border-radius:25px;
background:rgba(255,255,255,.08);
border:1px solid #d8ae74;
}
.card h2{
font-size:42px;
margin-bottom:20px;
color:#f7d7a7;
}
.card p{
font-size:28px;
margin:15px 0;
}
.btn{
display:inline-block;
padding:16px 35px;
background:#d8ae74;
color:#111;
text-decoration:none;
border-radius:50px;
font-weight:bold;
margin-top:20px;
font-size:22px;
}
.music-btn{
position:fixed;
top:20px;
left:20px;
z-index:999;
border:none;
padding:14px 20px;
border-radius:40px;
background:#fff;
font-size:18px;
cursor:pointer;
}
@media(max-width:768px){
h1{font-size:48px}
.subtitle{font-size:20px}
.invite h2{font-size:34px}
.invite p{font-size:22px}
.card p{font-size:22px}
}
</style>
</head>
<body>

<button class="music-btn" onclick="toggleMusic()">🎵 تشغيل / إيقاف</button>

<audio id="bgMusic" autoplay loop>
<source src="assets/music.mp3" type="audio/mpeg">
</audio>

<section class="hero">
<div class="content">
<p class="subtitle">وخلقناكم أزواجًا لتسكنوا إليها</p>
<h1>عمر & دعاء</h1>
<p class="subtitle">ندعوكم لحضور حفل زفافنا</p>

<div class="countdown">
<div class="box"><span id="days">0</span>يوم</div>
<div class="box"><span id="hours">0</span>ساعة</div>
<div class="box"><span id="minutes">0</span>دقيقة</div>
<div class="box"><span id="seconds">0</span>ثانية</div>
</div>
</div>
</section>

<section class="section invite">
<h2>بسم خالق الحب نبدأ دعوتنا إليكم</h2>

<p>
بكل الحب والسعادة<br>
يسعدنا حضوركم ومشاركتكم لنا<br>
أجمل لحظات العمر
</p>
</section>

<section class="section cover">
<img src="assets/hero.jpg">
</section>

<section class="section">
<div class="card">
<h2>تفاصيل الحفل</h2>
<p>الجمعة 16 أكتوبر 2026</p>
<p>الساعة 9 مساءً</p>
<p>قاعة Diamond Hall</p>

<a class="btn" target="_blank"
href="https://maps.app.goo.gl/RPXMxUht4xTKCKT37?g_st=ic">
فتح الخريطة
</a>

</div>
</section>

<script>
const targetDate = new Date("2026-10-16T21:00:00").getTime();

setInterval(()=>{
const now = new Date().getTime();
const distance = targetDate - now;

document.getElementById("days").innerHTML =
Math.floor(distance / (1000*60*60*24));

document.getElementById("hours").innerHTML =
Math.floor((distance % (1000*60*60*24)) / (1000*60*60));

document.getElementById("minutes").innerHTML =
Math.floor((distance % (1000*60*60)) / (1000*60));

document.getElementById("seconds").innerHTML =
Math.floor((distance % (1000*60)) / 1000);

},1000);

const music=document.getElementById("bgMusic");

function toggleMusic(){
if(music.paused){
music.play();
}else{
music.pause();
}
}

document.body.addEventListener('click',()=>{
music.play().catch(()=>{});
},{once:true});
</script>

</body>
</html>
